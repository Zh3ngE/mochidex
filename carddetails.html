{% extends "base.html" %}

{% block content %}

<div class="row">
    
    <!-- Image -->

    <div class="col-md-6 text-center">
        <img src="{{ card.images.large }}" 
             class="img-fluid rounded"
             alt="{{ card.name }}">
    </div>

    <!-- Info -->
     
    <div class="col-md-6">

        <h2>{{ card.name }}</h2>

        <p><strong>Set:</strong> {{ card.set.name }}</p>
        <p><strong>Series:</strong> {{ card.set.series }}</p>
        <p><strong>Number:</strong> {{ card.number }}/{{ card.set.printedTotal }}</p>
        <p><strong>Rarity:</strong> {{ card.rarity }}</p>

        <a href="{{ url_for('index') }}" class="btn btn-secondary mt-3">
            Back
        </a>

    </div>

</div>

{% endblock %}
